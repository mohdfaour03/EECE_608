# Matched (exchangeable) canary design — Steinke et al. (2023)-style
# randomized inclusion. All canaries are drawn from ONE distribution and
# membership is decided by a random half/half split. Fixes the
# appearance-difference artifact that produced pathological
# eps_lower > eps_upper at sigma 3.0/5.0 (inserted canaries had different
# patch positions and 0.75x intensity vs references in the old design).
#
# num_canaries is PER GROUP: 1000 inserted + 1000 held-out.
training_result_path: results/training/example_training_run.json
audit_regime: evaluator_controlled_canary_stress_test
auditor_variant: matched_random_canaries
auditor_strength_rank: 2
audit_mode: repeated_run
delta: 0.00001
repeated_seeds: [101, 102, 103, 104, 105]
canary:
  strategy: matched_random_canaries
  num_canaries: 1000
  insertion_rate: 0.01  # unused in matched mode; split is always half/half
  optimize_steps: 0
saturation:
  min_absolute_improvement: 0.05
  min_relative_improvement: 0.02
  tightness_ratio_tolerance: 0.01
  use_confidence_interval_overlap: true
run:
  results_root: results
  save_debug_artifacts: true
