# Per-epsilon Optuna HPO over MNIST (professor feedback 2026-07-08).
# Each target epsilon gets its own study; sigma is re-solved per trial.
base_train_config: configs/train/mnist_mlp_dp_sgd.yaml
target_epsilons: [0.3, 0.5, 1.0, 2.0, 4.0, 8.0]
n_trials: 30
sampler_seed: 20260708
base_trial_training_seed: 900000
study_name_prefix: hpo
results_root: results
search_space:
  learning_rate_min: 0.01
  learning_rate_max: 1.0
  batch_sizes: [128, 256, 512, 1024]
  epochs_min: 1
  epochs_max: 15
  clipping_norms: [0.5, 1.0, 2.0, 4.0]
